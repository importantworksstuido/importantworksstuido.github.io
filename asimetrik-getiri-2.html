<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asimetrik Getiri Hesaplayıcı</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --border: #e2ddd6;
    --text: #1a1714;
    --muted: #7a746c;
    --accent: #ff6b2b;
    --green: #1a7a4a;
    --green-bg: #edf7f2;
    --card-shadow: 0 2px 16px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 60px;
  }

  header {
    width: 100%;
    max-width: 560px;
    margin-bottom: 36px;
    animation: fadeDown 0.5s ease both;
  }

  header .label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 800;
    line-height: 1.15;
    color: var(--text);
  }

  header h1 span { color: var(--accent); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 560px;
    box-shadow: var(--card-shadow);
    margin-bottom: 16px;
    animation: fadeUp 0.5s ease both;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .input-group { margin-bottom: 16px; }
  .input-group:last-child { margin-bottom: 0; }

  .input-group label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .input-row {
    display: flex;
    align-items: center;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .input-row:focus-within { border-color: var(--accent); }

  .input-prefix {
    padding: 12px 14px;
    background: var(--bg);
    color: var(--muted);
    font-size: 14px;
    font-family: 'DM Mono', monospace;
    border-right: 1.5px solid var(--border);
    user-select: none;
  }

  .input-row input {
    flex: 1;
    padding: 12px 14px;
    border: none;
    outline: none;
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    color: var(--text);
    background: transparent;
    -moz-appearance: textfield;
  }

  .input-row input::placeholder { color: #c5bfb8; }
  .input-row input::-webkit-outer-spin-button,
  .input-row input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .multiplier-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #fff4ef;
    border: 1px solid #ffd4bf;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    margin-top: 12px;
    transition: opacity 0.3s ease;
  }

  .multiplier-badge.hidden { opacity: 0; pointer-events: none; }

  button {
    width: 100%;
    padding: 16px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    margin-top: 20px;
  }

  button:hover { background: #2d2925; transform: translateY(-1px); }
  button:active { transform: translateY(0); }

  .results-card { display: none; animation: fadeUp 0.4s ease both; }
  .results-card.visible { display: block; }

  .split-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .split-box {
    border-radius: 12px;
    padding: 18px;
    border: 1.5px solid var(--border);
  }

  .split-box .platform {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .split-box .amount {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: var(--text);
  }

  .split-box .pct { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .split-box.spot { border-color: #d0cbc4; background: #f0ede8; }
  .split-box.poly { border-color: #ffd4bf; background: #fff4ef; }
  .split-box.poly .amount { color: var(--accent); }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  .scenario-title {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .scenario-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    border-radius: 10px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
  }

  .scenario-row:last-child { margin-bottom: 0; }
  .scenario-row .label-col { font-size: 13px; color: var(--muted); }
  .scenario-row .value-col { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }

  .scenario-row.up { background: var(--green-bg); border-color: #b8e8ce; }
  .scenario-row.up .value-col { color: var(--green); }

  .scenario-row.crash { background: #fff4ef; border-color: #ffd4bf; }
  .scenario-row.crash .value-col { color: var(--accent); }
  .scenario-row.crash .label-col { color: var(--text); }

  .multiplier-line { font-size: 11px; color: var(--muted); margin-top: 4px; }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 420px) {
    .two-col { grid-template-columns: 1fr; }
    .split-row { grid-template-columns: 1fr; }
    .split-box .amount { font-size: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="label">Çift Yönlü Asimetrik Getiri Modeli</div>
  <h1>Asimetrik Kâr<br><span>Hesaplayıcı</span></h1>
</header>

<div class="card">
  <div class="section-title">Bütçe & Senaryo</div>
  <div class="two-col">
    <div class="input-group">
      <label>Toplam Bütçe</label>
      <div class="input-row">
        <span class="input-prefix">$</span>
        <input type="number" id="budget" placeholder="1000" min="1">
      </div>
    </div>
    <div class="input-group">
      <label>Yükseliş %</label>
      <div class="input-row">
        <span class="input-prefix">%</span>
        <input type="number" id="upside-pct" placeholder="10" min="0.1" step="0.1">
      </div>
    </div>
  </div>
</div>

<div class="card">
  <div class="section-title">Polymarket Kontrat Değerleri</div>
  <div class="input-group">
    <label>$100 Yatırınca Kazanılacak</label>
    <div class="input-row">
      <span class="input-prefix">$</span>
      <input type="number" id="poly-out" placeholder="13767" min="0.01" step="0.01">
    </div>
  </div>

  <div class="multiplier-badge hidden" id="multiplier-badge">
    ⚡ <span id="multiplier-val">—</span>x Çarpan
  </div>

  <button onclick="calculate()">Hesapla →</button>
</div>

<div class="card results-card" id="results">
  <div class="section-title">Stratejik Dağılım</div>

  <div class="split-row">
    <div class="split-box spot">
      <div class="platform">Binance Spot</div>
      <div class="amount" id="res-spot">—</div>
      <div class="pct" id="res-spot-pct">—</div>
    </div>
    <div class="split-box poly">
      <div class="platform">Polymarket</div>
      <div class="amount" id="res-poly">—</div>
      <div class="pct" id="res-poly-pct">—</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="scenario-title">Net Kâr Durumu</div>

  <div class="scenario-row up">
    <div class="label-col" id="res-up-label">Piyasa % Yükselirse</div>
    <div class="value-col" id="res-up">—</div>
  </div>

  <div class="scenario-row crash">
    <div>
      <div class="label-col">Çöküş Tetiklenirse</div>
      <div class="multiplier-line" id="res-crash-detail">—</div>
    </div>
    <div class="value-col" id="res-crash">—</div>
  </div>
</div>

<script>
  const polyOut = document.getElementById('poly-out');
  const badge = document.getElementById('multiplier-badge');
  const badgeVal = document.getElementById('multiplier-val');

  function updateMultiplier() {
    const o = parseFloat(polyOut.value);
    if (o > 0) {
      badgeVal.textContent = (o / 100).toFixed(2);
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
  }

  polyOut.addEventListener('input', updateMultiplier);

  function fmt(n) {
    const sign = n >= 0 ? '+' : '-';
    return sign + '$' + Math.abs(n).toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function calculate() {
    const budget = parseFloat(document.getElementById('budget').value);
    const upsidePct = parseFloat(document.getElementById('upside-pct').value);
    const pOut = parseFloat(polyOut.value);

    if (!budget || !upsidePct || !pOut) {
      alert('Lütfen tüm alanları doldurun.');
      return;
    }

    const multiplier = pOut / 100;
    // Poly = spot_kar poly_maliyetini karsilasin: spot*up% = poly -> poly = budget*up% / (multiplier + up%)
    const up = upsidePct / 100;
    const polyAmount = Math.ceil((budget * up) / (multiplier + up));
    const spotAmount = budget - polyAmount;

    // Yukselis: spot kar - poly maliyet (net pozitif olmali)
    const upNet = spotAmount * up - polyAmount;
    // Cokus: poly carpan getirisi (spot zarari da olur ama poly onu gecer)
    const crashGross = polyAmount * multiplier;

    document.getElementById('res-spot').textContent = '$' + spotAmount.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    document.getElementById('res-spot-pct').textContent = '%' + ((spotAmount / budget) * 100).toFixed(1) + ' bütçe';
    document.getElementById('res-poly').textContent = '$' + polyAmount.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    document.getElementById('res-poly-pct').textContent = '%' + ((polyAmount / budget) * 100).toFixed(1) + ' bütçe';

    document.getElementById('res-up-label').textContent = 'Piyasa %' + upsidePct + ' Yükselirse';
    document.getElementById('res-up').textContent = fmt(upNet);
    document.getElementById('res-crash').textContent = fmt(crashGross);
    document.getElementById('res-crash-detail').textContent =
      '$' + polyAmount.toFixed(2) + ' × ' + multiplier.toFixed(2) + 'x = $' + crashGross.toLocaleString('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });

    const resultsEl = document.getElementById('results');
    resultsEl.classList.add('visible');
    setTimeout(() => resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
  }
</script>

</body>
</html>
